<!DOCTYPE html>
<html>
<head>
  <title>FOUR7 SYSTEM</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  background: #000;
  color: white;
  font-family: 'Orbitron', sans-serif;
  text-align: center;
}

h1 {
  color: #ff003c;
  text-shadow: 0 0 15px #ff003c;
}

button {
  background: #0a0a0a;
  border: 1px solid #ff003c;
  color: #ff003c;
  padding: 10px 20px;
  cursor: pointer;
  box-shadow: 0 0 10px #ff003c;
}

button:hover {
  background: #ff003c;
  color: black;
}

table {
  margin: 20px auto;
  border-collapse: collapse;
  width: 95%;
  background: #050505;
  box-shadow: 0 0 15px #ff003c;
}

th, td {
  padding: 8px;
  border: 1px solid #111;
}

th {
  color: #ff003c;
}

input {
  background: transparent;
  border: none;
  color: white;
  width: 60px;
  text-align: center;
}

/* CORES */
.red { background: #220000; }
.yellow { background: #332200; }
.green { background: #002200; }

/* LINHA COMPLETA */
.linha-verde td {
  background: #002200 !important;
}

/* LOGIN */
#loginScreen {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box {
  background:#050505;
  border:1px solid #ff003c;
  padding:30px;
  box-shadow:0 0 20px #ff003c;
}
</style>
</head>

<body>

<div id="loginScreen">
  <div class="login-box">
    <h2 style="color:#ff003c;">FOUR7 ACCESS</h2>
    <input type="password" id="senhaInput" placeholder="Senha">
    <br><br>
    <button onclick="verificarSenha()">Entrar</button>
    <p id="erro" style="color:red; display:none;">Senha incorreta</p>
  </div>
</div>

<h1>FOUR7 SYSTEM</h1>

<button onclick="abrirModal()">+ ADICIONAR</button>

<div id="tabela"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input type="text" id="nome" placeholder="Nome">
    <button onclick="salvarMembro()">Salvar</button>
    <button onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDO-yQntq0yqyLQvM4cCPt0Ap7ZwuffwP4",
  authDomain: "controle-cpx.firebaseapp.com",
  projectId: "controle-cpx"
});

const db = getFirestore(app);

const META = 4500;
const SENHA = "resplav2671";

window.verificarSenha = function() {
  if (senhaInput.value === SENHA) {
    loginScreen.style.display = "none";
  } else {
    erro.style.display = "block";
  }
};

window.abrirModal = () => modal.style.display = "flex";
window.fecharModal = () => modal.style.display = "none";

window.salvarMembro = async function () {
  if (!nome.value) return;

  await addDoc(collection(db, "membros"), {
    nome: nome.value,
    seg:0, ter:0, qua:0, qui:0, sex:0, sab:0, dom:0
  });

  fecharModal();
  carregarMembros();
};

window.removerMembro = async function(id){
  await deleteDoc(doc(db, "membros", id));
  carregarMembros();
};

window.atualizarValor = async function(id, campo, valor) {
  await updateDoc(doc(db, "membros", id), {
    [campo]: Number(valor)
  });
  carregarMembros();
};

function getCor(valor){
  if (valor === 0) return "red";
  if (valor >= 600) return "green";
  return "yellow";
}

async function carregarMembros() {
  const querySnapshot = await getDocs(collection(db, "membros"));

  let html = `<table>
  <tr>
    <th>Nome</th>
    <th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th>
    <th>Sex</th><th>Sab</th><th>Dom</th>
    <th>Total</th>
    <th>Ação</th>
  </tr>`;

  querySnapshot.forEach((docSnap) => {
    const d = docSnap.data();
    const id = docSnap.id;
    const dias = ["seg","ter","qua","qui","sex","sab","dom"];

    let total = 0;
    dias.forEach(dia => total += (d[dia] || 0));

    let linhaClasse = total >= META ? "linha-verde" : "";

    html += `<tr class="${linhaClasse}"><td>${d.nome}</td>`;

    dias.forEach(dia => {
      const valor = d[dia] || 0;
      const cor = total >= META ? "" : getCor(valor);

      html += `<td class="${cor}">
        <input type="number" value="${valor}"
        onchange="atualizarValor('${id}','${dia}', this.value)">
      </td>`;
    });

    html += `<td>${total}</td>
    <td><button onclick="removerMembro('${id}')">X</button></td></tr>`;
  });

  html += "</table>";

  document.getElementById("tabela").innerHTML = html;
}

carregarMembros();
</script>

</body>
</html>
