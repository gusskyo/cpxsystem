<!DOCTYPE html>
<html>
<head>
  <title>CPX SYSTEM</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: white;
      font-family: 'Orbitron', sans-serif;
      text-align: center;
    }

    h1 {
      color: #ff0077;
      text-shadow: 0 0 15px #ff0077;
    }

    button {
      background: #0a0a0a;
      border: 1px solid #ff0077;
      color: #ff0077;
      padding: 10px 20px;
      cursor: pointer;
      box-shadow: 0 0 10px #ff0077;
      margin: 5px;
    }

    button:hover {
      background: #ff0077;
      color: black;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 95%;
      background: #050505;
      box-shadow: 0 0 15px #ff0077;
    }

    th, td {
      padding: 8px;
      border: 1px solid #111;
    }

    th {
      color: #ff0077;
    }

    input {
      background: transparent;
      border: none;
      color: white;
      width: 60px;
      text-align: center;
    }

    .red { background: #220000; }
    .yellow { background: #332200; }
    .green { background: #002200; }

    /* MODAIS */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #050505;
      border: 1px solid #ff0077;
      padding: 25px;
      box-shadow: 0 0 20px #ff0077;
      width: 300px;
    }

    .modal input, .modal select {
      width: 100%;
      margin: 10px 0;
      padding: 8px;
      background: black;
      border: 1px solid #ff0077;
      color: white;
    }

    .cancelar {
      background: #111;
      color: #ff0077;
      border: 1px solid #ff0077;
    }

    .cancelar:hover {
      background: #ff0077;
      color: black;
    }
  </style>
</head>

<body>

<h1>CPX SYSTEM</h1>

<button onclick="abrirModal()">+ ADICIONAR</button>

<div id="tabela"></div>

<!-- MODAL ADICIONAR -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Adicionar Membro</h3>
    <input type="text" id="nome" placeholder="Nome">
    <select id="tipo">
      <option value="membro">Membro</option>
      <option value="elite">Elite</option>
    </select>

    <button onclick="salvarMembro()">Salvar</button>
    <button class="cancelar" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<!-- MODAL REMOVER -->
<div class="modal" id="modalRemover">
  <div class="modal-content">
    <h3 id="textoRemover"></h3>

    <button onclick="confirmarRemocao()">Remover</button>
    <button class="cancelar" onclick="fecharRemover()">Cancelar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDO-yQntq0yqyLQvM4cCPt0Ap7ZwuffwP4",
  authDomain: "controle-cpx.firebaseapp.com",
  projectId: "controle-cpx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// MODAIS
window.abrirModal = () => document.getElementById("modal").style.display = "flex";
window.fecharModal = () => document.getElementById("modal").style.display = "none";

window.fecharRemover = () => document.getElementById("modalRemover").style.display = "none";

// CRIAR
window.salvarMembro = async function () {
  const nome = document.getElementById("nome").value;
  const tipo = document.getElementById("tipo").value;

  if (!nome) return;

  let meta = tipo === "elite" ? 2500000 : 10000;

  await addDoc(collection(db, "membros"), {
    nome,
    tipo,
    meta,
    seg: 0,
    ter: 0,
    qua: 0,
    qui: 0,
    sex: 0,
    sab: 0,
    dom: 0
  });

  fecharModal();
  carregarMembros();
};

// REMOVER COM MODAL
let idParaRemover = null;

window.removerMembro = function(id, nome) {
  idParaRemover = id;
  document.getElementById("textoRemover").innerText = "Remover " + nome + "?";
  document.getElementById("modalRemover").style.display = "flex";
};

window.confirmarRemocao = async function() {
  if (!idParaRemover) return;

  await deleteDoc(doc(db, "membros", idParaRemover));

  fecharRemover();
  carregarMembros();
};

// CORES
function getCor(valor, total, meta) {
  if (valor === 0) return "red";
  if (total >= meta) return "green";
  return "yellow";
}

// ATUALIZAR
window.atualizarValor = async function(id, campo, valor) {
  await updateDoc(doc(db, "membros", id), {
    [campo]: Number(valor)
  });
  carregarMembros();
};

// TABELA
async function carregarMembros() {
  const querySnapshot = await getDocs(collection(db, "membros"));

  let html = montarTabela("MEMBROS", "membro", querySnapshot);
  html += montarTabela("ELITE", "elite", querySnapshot);

  document.getElementById("tabela").innerHTML = html;
}

function montarTabela(titulo, tipoFiltro, querySnapshot) {
  let html = `<h2>${titulo}</h2><table>`;
  html += `<tr>
    <th>Nome</th>
    <th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th>
    <th>Sex</th><th>Sab</th><th>Dom</th>
    <th>Total</th>
    <th>Ação</th>
  </tr>`;

  querySnapshot.forEach((docSnap) => {
    const d = docSnap.data();
    if (d.tipo !== tipoFiltro) return;

    const id = docSnap.id;
    const dias = ["seg","ter","qua","qui","sex","sab","dom"];

    let total = 0;
    dias.forEach(dia => total += (d[dia] || 0));

    html += `<tr><td>${d.nome}</td>`;

    dias.forEach(dia => {
      const valor = d[dia] || 0;
      const cor = getCor(valor, total, d.meta);

      html += `<td class="${cor}">
        <input type="number" value="${valor}"
        onchange="atualizarValor('${id}','${dia}', this.value)">
      </td>`;
    });

    const corTotal = total >= d.meta ? "green" : "yellow";

    html += `<td class="${corTotal}">${total}</td>`;

    html += `<td>
      <button onclick="removerMembro('${id}','${d.nome}')">X</button>
    </td></tr>`;
  });

  html += "</table>";
  return html;
}

carregarMembros();
</script>

</body>
</html>
