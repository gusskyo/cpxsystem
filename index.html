<!DOCTYPE html>
<html>
<head>
  <title>CPX SYSTEM</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: radial-gradient(circle at top, #0a0a0a, #000000);
      color: white;
      font-family: 'Orbitron', sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      color: #ff0077;
      text-shadow: 0 0 10px #ff0077, 0 0 20px #ff0077;
    }

    button {
      background: linear-gradient(45deg, #ff0077, #ff3399);
      border: none;
      padding: 12px 20px;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 15px #ff0077;
      margin: 5px;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #ff0077;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 95%;
      background: rgba(10, 10, 10, 0.9);
      box-shadow: 0 0 20px #ff0077;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 8px;
      border: 1px solid #222;
      text-align: center;
    }

    th {
      color: #ff0077;
    }

    input {
      width: 60px;
      background: transparent;
      border: none;
      color: white;
      text-align: center;
    }

    .red { background: rgba(255,0,0,0.2); }
    .yellow { background: rgba(255,200,0,0.2); }
    .green { background: rgba(0,255,100,0.2); }

    .remove-btn {
      background: red;
      box-shadow: 0 0 10px red;
    }
  </style>
</head>

<body>

<h1>CPX SYSTEM</h1>

<button onclick="criarMembro()">+ ADICIONAR</button>

<div id="tabela"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDO-yQntq0yqyLQvM4cCPt0Ap7ZwuffwP4",
  authDomain: "controle-cpx.firebaseapp.com",
  projectId: "controle-cpx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ CRIAR MEMBRO
window.criarMembro = async function () {
  const nome = prompt("Nome:");
  let tipo = prompt("membro ou elite?");

  if (!nome || !tipo) return alert("Preencha tudo!");

  tipo = tipo.toLowerCase();
  let meta = tipo === "elite" ? 2500000 : 10000;

  await addDoc(collection(db, "membros"), {
    nome,
    tipo,
    meta,
    seg: 0,
    ter: 0,
    qua: 0,
    qui: 0,
    sex: 0,
    sab: 0,
    dom: 0
  });

  carregarMembros();
};

// ❌ REMOVER MEMBRO
window.removerMembro = async function(id) {
  const confirmar = confirm("Tem certeza que deseja remover?");
  if (!confirmar) return;

  await deleteDoc(doc(db, "membros", id));
  carregarMembros();
};

// 🎨 CORES
function getCor(valor, total, meta) {
  if (valor === 0) return "red";
  if (total >= meta) return "green";
  return "yellow";
}

// ✏️ ATUALIZAR VALOR
window.atualizarValor = async function(id, campo, valor) {
  await updateDoc(doc(db, "membros", id), {
    [campo]: Number(valor)
  });
  carregarMembros();
};

// 📊 TABELA
async function carregarMembros() {
  const querySnapshot = await getDocs(collection(db, "membros"));

  let html = "";

  html += montarTabela("MEMBROS", "membro", querySnapshot);
  html += montarTabela("ELITE", "elite", querySnapshot);

  document.getElementById("tabela").innerHTML = html;
}

function montarTabela(titulo, tipoFiltro, querySnapshot) {
  let html = `<h2>${titulo}</h2><table>`;
  html += `<tr>
    <th>Nome</th>
    <th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th>
    <th>Sex</th><th>Sab</th><th>Dom</th>
    <th>Total</th>
    <th>Ação</th>
  </tr>`;

  querySnapshot.forEach((docSnap) => {
    const d = docSnap.data();
    if (d.tipo !== tipoFiltro) return;

    const id = docSnap.id;
    const dias = ["seg","ter","qua","qui","sex","sab","dom"];

    let total = 0;
    dias.forEach(dia => total += (d[dia] || 0));

    html += `<tr><td>${d.nome}</td>`;

    dias.forEach(dia => {
      const valor = d[dia] || 0;
      const cor = getCor(valor, total, d.meta);

      html += `<td class="${cor}">
        <input type="number" value="${valor}"
        onchange="atualizarValor('${id}','${dia}', this.value)">
      </td>`;
    });

    const corTotal = total >= d.meta ? "green" : "yellow";

    html += `<td class="${corTotal}">${total}</td>`;

    html += `<td>
      <button class="remove-btn" onclick="removerMembro('${id}')">X</button>
    </td>`;

    html += `</tr>`;
  });

  html += "</table>";
  return html;
}

// 🚀 INICIAR
carregarMembros();
</script>

</body>
</html>
